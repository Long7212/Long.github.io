name: Deploy Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 配置Pages
        uses: actions/configure-pages@v5
      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
      - name: 部署到Pages
        uses: actions/deploy-pages@v4
